<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hermes Login Viewer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000; color: #e7e9ea;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    touch-action: none; user-select: none;
}
#app {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh; height: 100dvh;
}
#status-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; background: #16181c; border-bottom: 1px solid #2f3336;
    font-size: 13px; z-index: 10; flex-shrink: 0;
}
#status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ffd700; display: inline-block; margin-right: 6px;
}
#status-dot.connected { background: #00ba7c; }
#status-dot.authenticated { background: #1d9bf0; }
#status-text { flex: 1; }
#timer { color: #71767b; font-variant-numeric: tabular-nums; }
#canvas-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative; background: #000;
}
#browser-canvas {
    max-width: 100%; max-height: 100%;
    image-rendering: auto; cursor: default;
    touch-action: none;
}
#input-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 5; cursor: inherit;
}
#loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; color: #71767b; font-size: 14px;
}
#loading .spinner {
    width: 32px; height: 32px; border: 3px solid #2f3336;
    border-top-color: #1d9bf0; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#success-overlay {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.8); z-index: 20;
}
#success-overlay.show { display: flex; }
#success-card {
    background: #16181c; border: 1px solid #2f3336; border-radius: 16px;
    padding: 32px; text-align: center; max-width: 300px;
}
#success-card h2 { color: #00ba7c; margin-bottom: 8px; }
#success-card p { color: #71767b; font-size: 14px; }
</style>
</head>
<body>
<div id="app">
    <div id="status-bar">
        <span id="status-dot"></span>
        <span id="status-text">Connecting...</span>
        <span id="timer">--</span>
    </div>
    <div id="canvas-wrap">
        <canvas id="browser-canvas"></canvas>
        <div id="input-layer"></div>
        <div id="loading">
            <div class="spinner"></div>
            <div>Loading browser...</div>
        </div>
        <div id="success-overlay">
            <div id="success-card">
                <h2>Authenticated</h2>
                <p>Login successful. You can close this tab.</p>
            </div>
        </div>
    </div>
</div>
<script>
(function() {
    'use strict';

    // Token injected by server
    const TOKEN = '__TOKEN_PLACEHOLDER__';
    const STREAM_URL = '/login-stream/' + TOKEN;
    const INPUT_URL = '/login-input/' + TOKEN;
    let pollActive = false;
    let consecutiveErrors = 0;

    const $statusDot = document.getElementById('status-dot');
    const $statusText = document.getElementById('status-text');
    const $timer = document.getElementById('timer');
    const $loading = document.getElementById('loading');
    const $successOverlay = document.getElementById('success-overlay');
    const $canvasWrap = document.getElementById('canvas-wrap');

    function initCanvas() {
        canvas = document.getElementById('browser-canvas');
        ctx = canvas.getContext('2d');
    }

    function drawFrame(imageData, width, height) {
        canvas.width = width;
        canvas.height = height;
        const wrapRect = $canvasWrap.getBoundingClientRect();
        const scale = Math.min(wrapRect.width / width, wrapRect.height / height);
        canvas.style.width = Math.floor(width * scale) + 'px';
        canvas.style.height = Math.floor(height * scale) + 'px';
        img.onload = function() { ctx.drawImage(img, 0, 0, width, height); };
        img.src = 'data:image/jpeg;base64,' + imageData;
        $loading.style.display = 'none';
    }

    // ─── Long polling (proxy-compatible) ───────────────────
    let pollActive = false;
    let consecutiveErrors = 0;

    function startPolling() {
        if (pollActive) return;
        pollActive = true;
        pollLoop();
    }

    async function pollLoop() {
        while (pollActive) {
            await fetchFrameLong();
            if (!pollActive) break;
            // Small delay between polls to prevent flooding
            await new Promise(function(r) { setTimeout(r, 100); });
        }
    }

    async function fetchFrameLong() {
        try {
            var resp = await fetch(STREAM_URL.replace("/login-stream/", "/login-wait/"));
            var msg = await resp.json();
            if (msg.ok && msg.data) {
                drawFrame(msg.data, msg.width, msg.height);
                consecutiveErrors = 0;
                if (msg.authenticated) {
                    onAuthenticated();
                }
            }
        } catch (e) {
            consecutiveErrors++;
            if (consecutiveErrors > 10) {
                pollActive = false;
                setStatus('error', 'Connection lost. Reloading...');
                setTimeout(function() { location.reload(); }, 2000);
            }
        }
    }

    function onAuthenticated() {
        pollActive = false;
        setStatus('authenticated', 'Authenticated');
        $successOverlay.classList.add('show');
        if (timerInterval) clearInterval(timerInterval);
    }

    function sendInput(data) {
        fetch(INPUT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        }).catch(function() {});
    }

    function setStatus(state, text) {
        $statusDot.className = '';
        if (state === 'connected' || state === 'authenticated') {
            $statusDot.classList.add(state);
        }
        $statusText.textContent = text;
    }

    function startTimer() {
        timerInterval = setInterval(function() {
            var remaining = Math.max(0, Math.floor((expiresAt - Date.now()) / 1000));
            var min = Math.floor(remaining / 60);
            var sec = remaining % 60;
            $timer.textContent = min + ':' + sec.toString().padStart(2, '0');
            if (remaining <= 0) { clearInterval(timerInterval); $timer.textContent = 'Expired'; }
        }, 1000);
    }

    // ─── Input handling ─────────────────────────────────────
    function getCanvasCoords(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        return {
            x: (clientX - rect.left) / rect.width,
            y: (clientY - rect.top) / rect.height
        };
    }

    // Mouse
    document.addEventListener('mousedown', function(e) {
        var pos = getCanvasCoords(e.clientX, e.clientY);
        sendInput({ type: 'mouse', x: pos.x, y: pos.y, action: 'down', button: e.button });
    });
    document.addEventListener('mousemove', function(e) {
        var pos = getCanvasCoords(e.clientX, e.clientY);
        sendInput({ type: 'mouse', x: pos.x, y: pos.y, action: 'move', button: e.button });
    });
    document.addEventListener('mouseup', function(e) {
        var pos = getCanvasCoords(e.clientX, e.clientY);
        sendInput({ type: 'mouse', x: pos.x, y: pos.y, action: 'up', button: e.button });
    });

    var lastClickTime = 0, lastClickPos = null;
    canvas.addEventListener('click', function(e) {
        var now = Date.now();
        var pos = getCanvasCoords(e.clientX, e.clientY);
        if (lastClickPos && now - lastClickTime < 300 &&
            Math.abs(pos.x - lastClickPos.x) < 0.02 &&
            Math.abs(pos.y - lastClickPos.y) < 0.02) {
            sendInput({ type: 'mouse', x: pos.x, y: pos.y, action: 'click', button: 0 });
            lastClickTime = 0;
        } else {
            sendInput({ type: 'mouse', x: pos.x, y: pos.y, action: 'down', button: 0 });
            sendInput({ type: 'mouse', x: pos.x, y: pos.y, action: 'up', button: 0 });
            lastClickTime = now;
            lastClickPos = pos;
        }
    });

    // Wheel
    document.addEventListener('wheel', function(e) {
        e.preventDefault();
        sendInput({ type: 'wheel', dx: e.deltaX, dy: e.deltaY });
    }, { passive: false });

    // Keyboard
    document.addEventListener('keydown', function(e) {
        if (['Shift', 'Control', 'Alt', 'Meta'].includes(e.key)) return;
        sendInput({ type: 'key', key: e.key, code: e.code, modifiers: getModifiers(e) });
        if (e.key.length === 1 || e.key === 'Backspace') {
            e.preventDefault();
            sendInput({ type: 'type', text: e.key });
        }
    });

    function getModifiers(e) {
        var mods = 0;
        if (e.altKey) mods |= 1;
        if (e.ctrlKey) mods |= 2;
        if (e.metaKey) mods |= 4;
        if (e.shiftKey) mods |= 8;
        return mods;
    }

    // Touch
    var inputLayer = document.getElementById('input-layer');
    var touchStartY = 0;

    inputLayer.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (e.touches.length === 1) {
            touchActive = true;
            touchStartY = e.touches[0].clientY;
            var pos = getCanvasCoords(e.touches[0].clientX, e.touches[0].clientY);
            sendInput({ type: 'mouse', x: pos.x, y: pos.y, action: 'down', button: 0 });
            lastTouchPos = pos;
        }
    }, { passive: false });

    inputLayer.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (!touchActive || e.touches.length !== 1) return;
        var touch = e.touches[0];
        var pos = getCanvasCoords(touch.clientX, touch.clientY);
        sendInput({ type: 'mouse', x: pos.x, y: pos.y, action: 'move', button: 0 });
        var dy = touchStartY - touch.clientY;
        if (Math.abs(dy) > 10) {
            sendInput({ type: 'wheel', dx: 0, dy: dy * 2 });
            touchStartY = touch.clientY;
        }
        lastTouchPos = pos;
    }, { passive: false });

    inputLayer.addEventListener('touchend', function(e) {
        e.preventDefault();
        touchActive = false;
        if (lastTouchPos) {
            sendInput({ type: 'mouse', x: lastTouchPos.x, y: lastTouchPos.y, action: 'up', button: 0 });
        }
    }, { passive: false });

    // ─── Init ──────────────────────────────────────────────
    initCanvas();
    startTimer();
    startPolling();

    window.addEventListener('beforeunload', function() {
        if (eventSource) eventSource.close();
    });
})();
</script>
</body>
</html>
